# Simple workflow for deploying static content to GitHub Pages
name: Deploy to GitHub Pages

on:
  # Запуск при пуше в main ветку
  push:
    branches:
      - main

  # Возможность ручного запуска из Actions tab
  workflow_dispatch:

# Разрешения для GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременный деплой только одного
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
