<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VK OAuth Callback</title>
  </head>
  <body>
    <script>
      // VK OAuth Callback Handler
      // Эта страница получает code от VK и передаёт его основному приложению через postMessage

      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      // Get code and state from URL
      const code = getQueryParam('code');
      const state = getQueryParam('state');
      const error = getQueryParam('error');
      const errorReason = getQueryParam('error_reason');

      // Send message to opener window
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({
          type: 'VK_OAUTH_CALLBACK',
          code: code,
          state: state,
          error: error,
          errorReason: errorReason,
        }, window.location.origin);
      }

      // Show status to user
      document.body.innerHTML = `
        <div style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          color: white;
        ">
          <div style="
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
          ">
            ${error 
              ? `
                <div style="font-size: 48px; margin-bottom: 20px;">❌</div>
                <h2 style="margin: 0 0 10px 0;">Авторизация не удалась</h2>
                <p style="color: #666; margin: 0;">
                  ${errorReason || 'Что-то пошло не так'}
                </p>
                <p style="color: #999; font-size: 14px; margin-top: 20px;">
                  Это окно закроется автоматически...
                </p>
              `
              : code
                ? `
                  <div style="font-size: 48px; margin-bottom: 20px;">✅</div>
                  <h2 style="margin: 0 0 10px 0;">Успешно!</h2>
                  <p style="color: #666; margin: 0;">
                    Авторизация пройдена. Возвращаемся в приложение...
                  </p>
                `
                : `
                  <div style="font-size: 48px; margin-bottom: 20px;">⏳</div>
                  <h2 style="margin: 0 0 10px 0;">Обработка...</h2>
                  <p style="color: #666; margin: 0;">
                    Пожалуйста, подождите...
                  </p>
                `
            }
          </div>
        </div>
      `;

      // Close window after delay
      setTimeout(() => {
        window.close();
      }, 2000);
    </script>
  </body>
</html>
