<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>VK OAuth Callback</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      }
      .container {
        background: rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        max-width: 400px;
        width: 90%;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      h1 { font-size: 24px; margin-bottom: 10px; }
      p { font-size: 14px; opacity: 0.8; }
      .error { background: rgba(255,0,0,0.2); border: 1px solid rgba(255,0,0,0.4); }
      .success { background: rgba(0,255,0,0.2); border: 1px solid rgba(0,255,0,0.4); }
      .icon { font-size: 48px; margin-bottom: 20px; display: block; }
    </style>
  </head>
  <body>
    <div class="container" id="container">
      <div class="spinner"></div>
      <h1>Обработка авторизации...</h1>
      <p>Пожалуйста, подождите</p>
    </div>

    <script>
      function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
      }

      function showMessage(icon, title, subtitle) {
        const container = document.getElementById('container');
        container.innerHTML = `
          <span class="icon">${icon}</span>
          <h1>${title}</h1>
          <p>${subtitle}</p>
        `;
      }

      async function handleCallback() {
        const code = getQueryParam('code');
        const state = getQueryParam('state');
        const error = getQueryParam('error');
        const errorReason = getQueryParam('error_reason');
        const isVkMiniApp = window.location.search.includes('vk_app_id');

        // Обработка ошибок
        if (error) {
          showMessage('❌', 'Ошибка авторизации', errorReason || error);
          setTimeout(() => {
            if (window.opener && !window.opener.closed) {
              window.close();
            } else {
              window.location.href = '/';
            }
          }, 3000);
          return;
        }

        if (!code) {
          showMessage('❌', 'Код не получен', 'VK не вернул код авторизации');
          setTimeout(() => {
            window.location.href = '/';
          }, 3000);
          return;
        }

        // Успешное получение кода
        showMessage('✅', 'Авторизация успешна!', 'Обмен кода на токен...');

        try {
          // Если открыто в popup
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({
              type: 'VK_OAUTH_CALLBACK',
              code: code,
              state: state,
            }, window.location.origin);

            setTimeout(() => {
              window.close();
            }, 1000);
            return;
          }

          // Если это VK Mini App — используем postMessage для родителя
          if (isVkMiniApp && window.parent !== window) {
            window.parent.postMessage({
              type: 'VK_OAUTH_CALLBACK',
              code: code,
              state: state,
            }, '*');
            return;
          }

          // Прямой редирект с кодом
          window.location.href = `/?vk_code=${encodeURIComponent(code)}`;

        } catch (err) {
          showMessage('❌', 'Ошибка обработки', err.message || 'Неизвестная ошибка');
        }
      }

      handleCallback();
    </script>
  </body>
</html>
